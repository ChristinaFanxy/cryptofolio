<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CryptoFolio · 加密资产管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111A;--surf:#0E1B28;--bdr:#17283A;--txt:#C5D8EE;
  --dim:#3A556A;--mid:#6688A8;--acc:#00FFA3;--red:#FF4D6A;
  --mono:'Courier New',monospace;--sans:'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* Layout */
#header{height:52px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;
  justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:50;background:var(--bg)}
#nav{border-bottom:1px solid var(--bdr);display:flex;padding:0 26px;background:var(--bg)}
#main{padding:22px 26px}

/* Nav tabs */
.tab{padding:12px 15px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:400;
  color:var(--mid);border-bottom:2px solid transparent;font-family:var(--mono);transition:all .15s}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}

/* Buttons */
.btn{padding:9px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;
  font-family:var(--mono);transition:all .15s;border:1px solid var(--acc)44;
  background:#00FFA318;color:var(--acc)}
.btn:hover{background:var(--acc);color:#001}
.btn.ghost{background:transparent;color:var(--mid);border-color:var(--bdr)}
.btn.ghost:hover{background:var(--bdr)}
.btn.red{background:transparent;color:var(--red);border-color:#FF4D6A33}
.btn.red:hover{background:#FF4D6A18}
.btn.sm{padding:5px 11px;font-size:11px}
.btn.ai-btn{display:flex;align-items:center;gap:7px;padding:7px 15px}

/* Cards / surfaces */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:18px 20px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:22px}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px}
.kpi-label{font-size:10px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;
  font-family:var(--mono);margin-bottom:7px}
.kpi-val{font-size:22px;font-weight:800;font-family:var(--mono);margin-bottom:3px}
.kpi-sub{font-size:11px;color:var(--mid)}

/* Tables */
.tbl-wrap{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;overflow:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th{padding:10px 14px;text-align:left;font-size:10px;color:var(--dim);text-transform:uppercase;
  letter-spacing:1.2px;font-family:var(--mono);font-weight:500;border-bottom:1px solid var(--bdr)}
td{padding:10px 14px;border-bottom:1px solid #17283A22}
.mono{font-family:var(--mono)}
.asset-name{font-size:14px;font-weight:700;color:var(--txt)}

/* Tags */
.tag{font-size:11px;padding:2px 8px;border-radius:4px;font-family:var(--mono);white-space:nowrap;display:inline-block}

/* Forms */
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;color:var(--dim);letter-spacing:1.3px;
  text-transform:uppercase;font-family:var(--mono);margin-bottom:5px}
input,select,textarea{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;
  padding:9px 13px;color:var(--txt);font-size:13px;font-family:var(--mono);width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select option{background:var(--surf)}
textarea{resize:none;font-family:var(--sans);font-size:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;
  padding:26px 30px;width:min(520px,96vw);max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 64px #000d}
.modal.wide{width:min(700px,96vw)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-size:16px;font-weight:700;color:var(--txt);font-family:var(--mono)}
.modal-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:22px;line-height:1}

/* Distribution bars */
.dist-row{margin-bottom:14px}
.dist-hdr{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;font-family:var(--mono)}
.bar-bg{height:5px;background:var(--bg);border-radius:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* AI Chat */
.chat-msgs{height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
  margin-bottom:12px;padding-right:4px}
.bubble{max-width:80%;padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap}
.bubble.ai{border-radius:12px 12px 12px 2px;background:var(--bg);border:1px solid var(--bdr);color:var(--txt)}
.bubble.user{border-radius:12px 12px 2px 12px;background:#00FFA318;border:1px solid #00FFA344;color:var(--acc);align-self:flex-end}
.chat-input-row{display:flex;gap:10px}
.chat-hint{margin-top:7px;font-size:11px;color:var(--dim)}

/* Upload area */
.upload-area{border:2px dashed var(--bdr);border-radius:10px;padding:20px;text-align:center;
  cursor:pointer;transition:border-color .2s;margin-bottom:12px}
.upload-area:hover,.upload-area.dragover{border-color:var(--acc)}
.upload-area input{display:none}
.upload-preview{max-width:100%;max-height:200px;border-radius:8px;margin-top:10px;display:block;margin:10px auto 0}

/* FAB */
#fab{position:fixed;bottom:22px;right:22px;width:48px;height:48px;border-radius:50%;
  background:var(--acc);border:none;cursor:pointer;font-size:20px;
  box-shadow:0 4px 18px #00FFA366;display:flex;align-items:center;justify-content:center;
  z-index:100;transition:transform .15s;color:#001;font-weight:bold}
#fab:hover{transform:scale(1.12)}

/* Misc */
.empty{padding:36px;text-align:center;color:var(--dim);font-size:13px}
.del-confirm{display:flex;gap:6px;align-items:center}
.del-confirm span{font-size:11px;color:var(--red)}
.pnl-pos{color:#00FFA3}
.pnl-neg{color:#FF4D6A}
.pnl-zero{color:var(--dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc)}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700;color:var(--txt);font-family:var(--mono)}
.filter-row{display:flex;gap:10px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s}
.color-dot.sel{border-color:#fff;transform:scale(1.2)}
.finance-kpis{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px}
.acc-card{transition:border-color .2s,transform .15s}
.acc-card:hover{transform:translateY(-2px)}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:9px">
    <div class="dot"></div>
    <span style="font-size:14px;font-weight:800;font-family:var(--mono);letter-spacing:1px">CRYPTOFOLIO</span>
    <span style="font-size:11px;color:var(--dim);margin-left:4px">加密资产管理</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn ghost ai-btn" onclick="openImport()" style="font-size:12px;padding:7px 13px">
      <span>📥</span><span>导入 Notion CSV</span>
    </button>
    <button id="refresh-btn" class="btn ghost ai-btn" onclick="refreshPrices()" style="font-size:12px;padding:7px 13px">
      <span id="refresh-icon">↻</span><span id="refresh-label">刷新价格</span>
    </button>
    <button id="apikey-btn" class="btn ghost ai-btn" onclick="openApiKeyModal()" style="font-size:12px;padding:7px 13px" title="设置 Claude API Key">
      <span id="apikey-icon">🔑</span><span id="apikey-label">API Key</span>
    </button>
    <button class="btn ai-btn" onclick="openAI()">
      <span>✦</span><span>AI 智能录入</span>
    </button>
  </div>
</div>

<div id="nav">
  <button class="tab active" onclick="goTab('overview',this)">总览</button>
  <button class="tab" onclick="goTab('positions',this)">持仓</button>
  <button class="tab" onclick="goTab('trades',this)">交易</button>
  <button class="tab" onclick="goTab('finance',this)">理财</button>
  <button class="tab" onclick="goTab('transfers',this)">资金流水</button>
  <button class="tab" onclick="goTab('accounts',this)">账户</button>
</div>

<div id="main"></div>
<button id="fab" onclick="openAI()">✦</button>
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const STORE = 'cryptofolio_v1';
let state = load();

function load(){
  try{
    const s = localStorage.getItem(STORE);
    if(s) return JSON.parse(s);
  }catch(e){}
  return {
    accounts:[
      {id:'a1',name:'Binance',  type:'CEX',     color:'#F0B90B'},
      {id:'a2',name:'OKX',      type:'CEX',     color:'#2563EB'},
      {id:'a3',name:'Uniswap',  type:'DEX',     color:'#FF007A'},
      {id:'a4',name:'美股账户',  type:'US_STOCK',color:'#10B981'},
      {id:'a5',name:'MetaMask', type:'WALLET',  color:'#E97B2E'},
    ],
    positions:[],trades:[],finance:[],transfers:[]
  };
}
function save(){ try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){} }
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
const today = () => new Date().toISOString().slice(0,10);

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const TYPE_LABEL = {CEX:'CEX',DEX:'DEX',US_STOCK:'美股',WALLET:'链上钱包'};
const TYPE_COLOR  = {CEX:'#F0B90B',DEX:'#FF007A',US_STOCK:'#10B981',WALLET:'#E97B2E'};
const FIN_TYPES   = {STAKING:'Staking',LENDING:'借贷',LP:'LP做市',FIXED:'定期',OTHER:'其他'};
const COLORS = ['#F0B90B','#FF007A','#10B981','#E97B2E','#2563EB','#8B5CF6','#EC4899','#00FFA3','#FF4D6A','#06B6D4'];

function f2(n,d=2){
  if(n===''||n==null||isNaN(+n)) return '—';
  return (+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function usd(n){ return n===''||n==null||isNaN(+n) ? '—' : '$'+f2(n); }
function pclr(n){ return +n>0?'pnl-pos':+n<0?'pnl-neg':'pnl-zero'; }
function tag(text,color){ return `<span class="tag" style="color:${color};background:${color}22">${esc(text)}</span>`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function accTag(accountId){
  const a = state.accounts.find(x=>x.id===accountId);
  return a ? tag(a.name,a.color) : '—';
}

// ═══════════════════════════════════════════════════════
// TAB ROUTING
// ═══════════════════════════════════════════════════════
let currentTab = 'overview';
function goTab(tab, el){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  render();
}
function render(){ renderTab(currentTab); }

function renderTab(tab){
  const m = document.getElementById('main');
  if(tab==='overview')  m.innerHTML = renderOverview();
  if(tab==='positions') m.innerHTML = renderPositions();
  if(tab==='trades')    m.innerHTML = renderTrades();
  if(tab==='finance')   m.innerHTML = renderFinance();
  if(tab==='transfers') m.innerHTML = renderTransfers();
  if(tab==='accounts')  m.innerHTML = renderAccounts();
}

// ═══════════════════════════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════════════════════════
function renderOverview(){
  const byType = {};
  state.positions.forEach(p=>{
    const acc = state.accounts.find(a=>a.id===p.accountId); if(!acc) return;
    const v = p.currentValue!==''&&p.currentValue!=null ? +p.currentValue : (+p.amount||0)*(+p.currentPrice||0);
    byType[acc.type] = (byType[acc.type]||0)+v;
  });
  const total = Object.values(byType).reduce((a,b)=>a+b,0);
  const totPnl = state.trades.reduce((s,t)=>s+(+t.pnl||0),0);
  const totInc = state.finance.reduce((s,f)=>s+(+f.income||0),0);
  const recent = [...state.trades].sort((a,b)=>b.date>a.date?1:-1).slice(0,6);

  const pnlSign = totPnl>=0?'+':'';
  const pnlC = totPnl>0?'#00FFA3':totPnl<0?'#FF4D6A':'var(--mid)';

  const recentRows = recent.map(t=>{
    const acc = state.accounts.find(a=>a.id===t.accountId);
    const sideClr = t.side==='BUY'?'#00FFA3':'#FF4D6A';
    const valStr = t.pnl!==''&&t.pnl!=null ? (t.pnl>=0?'+':'')+usd(t.pnl) : usd((+t.amount||0)*(+t.price||0));
    const valClr = t.pnl!==''&&t.pnl!=null ? (t.pnl>0?'#00FFA3':t.pnl<0?'#FF4D6A':'var(--mid)') : 'var(--mid)';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr)">
      <div style="display:flex;align-items:center;gap:7px">
        <span class="mono" style="font-size:13px;font-weight:700;color:var(--txt)">${esc(t.asset)}</span>
        ${tag(t.side==='BUY'?'买入':'卖出',sideClr)}
        ${acc?tag(acc.name,acc.color):''}
      </div>
      <div style="text-align:right">
        <div class="mono" style="font-size:12px;color:${valClr}">${valStr}</div>
        <div style="font-size:10px;color:var(--dim)">${esc(t.date)}</div>
      </div>
    </div>`;
  }).join('');

  const distRows = ['CEX','DEX','US_STOCK','WALLET'].map(type=>{
    const v = byType[type]||0;
    const pct = total>0 ? v/total*100 : 0;
    const clr = TYPE_COLOR[type];
    return `<div class="dist-row">
      <div class="dist-hdr">
        <span style="color:var(--mid)">${TYPE_LABEL[type]}</span>
        <span style="color:var(--txt)">${usd(v)} <span style="color:var(--dim)">· ${pct.toFixed(1)}%</span></span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${clr};box-shadow:0 0 6px ${clr}55"></div></div>
    </div>`;
  }).join('');

  return `
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">总资产</div><div class="kpi-val">${usd(total)}</div><div class="kpi-sub">${state.positions.length} 个持仓</div></div>
    <div class="kpi"><div class="kpi-label">累计盈亏</div><div class="kpi-val" style="color:${pnlC}">${pnlSign}${usd(totPnl)}</div><div class="kpi-sub">${state.trades.length} 笔交易</div></div>
    <div class="kpi"><div class="kpi-label">理财收益</div><div class="kpi-val" style="color:var(--acc)">+${usd(totInc)}</div><div class="kpi-sub">${state.finance.filter(f=>f.status==='ACTIVE').length} 个进行中</div></div>
    <div class="kpi"><div class="kpi-label">账户数量</div><div class="kpi-val">${state.accounts.length}</div><div class="kpi-sub">${Object.keys(byType).map(t=>TYPE_LABEL[t]).join(' / ')||'暂无持仓'}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="card">
      <div style="font-size:10px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono);margin-bottom:16px">资金分布</div>
      ${total===0?'<div style="font-size:13px;color:var(--dim)">暂无持仓数据，添加持仓后显示</div>':distRows}
    </div>
    <div class="card">
      <div style="font-size:10px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono);margin-bottom:16px">最近交易</div>
      ${recent.length===0?'<div style="font-size:13px;color:var(--dim)">暂无交易记录</div>':recentRows}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// POSITIONS  —  inline row editing
// ═══════════════════════════════════════════════════════
let posSort    = {col:'value', dir:-1};
let posEditing = null; // id of row currently being edited

function sortPos(col){
  if(posEditing){ alert('请先确认或取消当前编辑'); return; }
  if(posSort.col===col) posSort.dir *= -1;
  else { posSort.col=col; posSort.dir=-1; }
  render();
}

function startEditPos(id){
  posEditing = id;
  render();
  // Focus first input
  setTimeout(()=>{ document.getElementById('ie-amount')?.focus(); },50);
}

function cancelEditPos(){
  posEditing = null;
  render();
}

// Live value recalc while editing
function recalcValue(){
  const amt   = parseFloat(document.getElementById('ie-amount')?.value)||0;
  const price = parseFloat(document.getElementById('ie-price')?.value)||0;
  const el    = document.getElementById('ie-value-live');
  if(el) el.textContent = amt && price ? '$'+(amt*price).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
}

function confirmEditPos(id){
  const amt      = document.getElementById('ie-amount')?.value||'';
  const avgCost  = document.getElementById('ie-avgcost')?.value||'';
  const price    = document.getElementById('ie-price')?.value||'';
  const note     = document.getElementById('ie-note')?.value||'';

  state.positions = state.positions.map(p=>{
    if(p.id!==id) return p;
    // Always derive currentValue from price × amount (no manual override)
    const val = (parseFloat(amt)||0)*(parseFloat(price)||0);
    return {...p, amount:amt, avgCost:avgCost, currentPrice:price,
      currentValue: val>0 ? val.toFixed(2) : '', note};
  });
  posEditing = null;
  save();
  render();
  // Re-open account detail modal if we came from there
  if(_accDetailOpen) viewAcc(_accDetailOpen);
}

let _accDetailOpen = null; // track if account detail is open

function renderPositions(){
  const getVal = p => {
    const amt = parseFloat(p.amount)||0;
    const prc = parseFloat(p.currentPrice)||0;
    if(amt && prc) return amt*prc;
    if(p.currentValue!==''&&p.currentValue!=null) return +p.currentValue;
    return 0;
  };

  const sorted = [...state.positions].sort((a,b)=>{
    if(posSort.col==='value')   return posSort.dir*(getVal(b)-getVal(a));
    if(posSort.col==='asset')   { const d=a.asset<b.asset?-1:a.asset>b.asset?1:0; return posSort.dir*d; }
    if(posSort.col==='account'){
      const na=(state.accounts.find(x=>x.id===a.accountId)?.name||'');
      const nb=(state.accounts.find(x=>x.id===b.accountId)?.name||'');
      return posSort.dir*(na<nb?-1:na>nb?1:0);
    }
    if(posSort.col==='amount')  return posSort.dir*((parseFloat(b.amount)||0)-(parseFloat(a.amount)||0));
    if(posSort.col==='price')   return posSort.dir*((parseFloat(b.currentPrice)||0)-(parseFloat(a.currentPrice)||0));
    return 0;
  });

  const arrow = col => posSort.col===col ? (posSort.dir===-1?' ↓':' ↑') : ' ·';
  const th = (col,lbl) => `<th style="cursor:pointer;user-select:none" onclick="sortPos('${col}')">${lbl}<span style="color:var(--acc)">${arrow(col)}</span></th>`;

  // Compact inline input style
  const iStyle = `background:var(--bg);border:1px solid var(--acc)55;border-radius:5px;padding:4px 7px;color:var(--txt);font-size:12px;font-family:var(--mono);width:100%;outline:none`;

  const rows = sorted.length===0
    ? `<tr><td colspan="8" class="empty">暂无持仓 · 通过 AI 录入或手动添加</td></tr>`
    : sorted.map(p=>{
        const v = getVal(p);
        if(posEditing===p.id){
          // ── editing row ──
          const initVal = v>0 ? '$'+(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
          return `<tr style="background:#00FFA308;outline:1px solid var(--acc)33">
            <td>${accTag(p.accountId)}</td>
            <td class="asset-name mono" style="color:var(--acc)">${esc(p.asset)}</td>
            <td><input id="ie-amount"  style="${iStyle}" type="number" value="${esc(p.amount)}"       placeholder="数量"   oninput="recalcValue()"/></td>
            <td><input id="ie-avgcost" style="${iStyle}" type="number" value="${esc(p.avgCost||'')}"   placeholder="均价"/></td>
            <td><input id="ie-price"   style="${iStyle}" type="number" value="${esc(p.currentPrice||'')}" placeholder="当前价" oninput="recalcValue()"/></td>

            <td><div style="display:flex;gap:5px">
              <button class="btn sm" onclick="confirmEditPos('${p.id}')">✓ 确认</button>
              <button class="btn ghost sm" onclick="cancelEditPos()">取消</button>
            </div></td>
          </tr>`;
        } else {
          // ── display row ──
          const noteShort = p.note
            ? `<span title="${esc(p.note)}" style="font-size:11px;color:var(--dim);max-width:110px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;cursor:help">${esc(p.note)}</span>`
            : `<span style="color:var(--bdr)">—</span>`;
          return `<tr style="cursor:pointer" onclick="startEditPos('${p.id}')" title="点击行内编辑">
            <td onclick="event.stopPropagation()">${accTag(p.accountId)}</td>
            <td class="asset-name mono">${esc(p.asset)}</td>
            <td class="mono" style="font-size:12px;color:var(--mid)">${f2(p.amount,4)}</td>
            <td class="mono" style="font-size:12px;color:var(--mid)">${usd(p.avgCost)}</td>
            <td class="mono" style="font-size:12px;color:var(--mid)">${usd(p.currentPrice)}</td>
            <td class="mono" style="font-size:13px;color:var(--txt)">${usd(v)}</td>
            <td>${noteShort}</td>
            <td onclick="event.stopPropagation()">
              <button class="btn red sm" onclick="delPos('${p.id}')">删除</button>
            </td>
          </tr>`;
        }
      }).join('');

  const hint = posEditing
    ? `<div style="font-size:11px;color:var(--acc);margin-bottom:10px">✏️ 正在编辑 — 修改数字后价值自动联动，点击「✓ 确认」保存</div>`
    : `<div style="font-size:11px;color:var(--dim);margin-bottom:10px">点击任意行直接编辑 · 价值 = 价格 × 数量实时计算</div>`;

  return `<div class="section-hdr"><span class="section-title">持仓管理</span>
    <button class="btn" onclick="addPos()">+ 手动添加</button></div>
  ${hint}
  <div class="tbl-wrap"><table>
    <thead><tr>
      ${th('account','账户')}${th('asset','资产')}${th('amount','数量')}
      <th>均价</th>${th('price','当前价')}${th('value','价值')}
      <th>备注</th><th>操作</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

// ═══════════════════════════════════════════════════════
// TRANSFERS  —  出入金 & 账户间转账
// ═══════════════════════════════════════════════════════

const TXN_TYPES = {
  DEPOSIT:    {label:'入金',    color:'#00FFA3', icon:'↓'},
  WITHDRAW:   {label:'出金',    color:'#FF4D6A', icon:'↑'},
  TRANSFER:   {label:'内部转账', color:'#6688A8', icon:'⇄'},
};

let txnFilter = {type:'', accountId:''};

// KPI: 只统计 USD 资产的入出金作为法币净值；其他资产按记录金额算
function txnUsdVal(t){
  // amount = qty * price，存的就是这个结果
  return parseFloat(t.amount)||0;
}

function renderTransfers(){
  if(!state.transfers) state.transfers = [];

  const totalIn  = state.transfers.filter(t=>t.type==='DEPOSIT') .reduce((s,t)=>s+txnUsdVal(t),0);
  const totalOut = state.transfers.filter(t=>t.type==='WITHDRAW').reduce((s,t)=>s+txnUsdVal(t),0);
  const netFlow  = totalIn - totalOut;
  const netClr   = netFlow>=0 ? 'var(--acc)' : 'var(--red)';

  let list = [...state.transfers].sort((a,b)=>b.date>a.date?1:-1);
  if(txnFilter.type)      list = list.filter(t=>t.type===txnFilter.type);
  if(txnFilter.accountId) list = list.filter(t=>t.fromAccountId===txnFilter.accountId||t.toAccountId===txnFilter.accountId);

  const rows = list.length===0
    ? `<tr><td colspan="9" class="empty">暂无记录 · 点击「+ 添加」记录出入金或转账</td></tr>`
    : list.map(t=>{
        const txn     = TXN_TYPES[t.type]||TXN_TYPES.DEPOSIT;
        const fromAcc = state.accounts.find(a=>a.id===t.fromAccountId);
        const toAcc   = state.accounts.find(a=>a.id===t.toAccountId);

        let flowHtml = '';
        if(t.type==='DEPOSIT')
          flowHtml = `<span style="color:var(--dim);font-size:12px">${esc(t.externalName||'外部')} → </span>${toAcc?accTagSmall(toAcc):'—'}`;
        else if(t.type==='WITHDRAW')
          flowHtml = `${fromAcc?accTagSmall(fromAcc):'—'}<span style="color:var(--dim);font-size:12px"> → ${esc(t.externalName||'外部')}</span>`;
        else
          flowHtml = `${fromAcc?accTagSmall(fromAcc):'—'}<span style="color:var(--dim);font-size:13px;margin:0 5px">→</span>${toAcc?accTagSmall(toAcc):'—'}`;

        const amtClr = t.type==='DEPOSIT'?'var(--acc)':t.type==='WITHDRAW'?'var(--red)':'var(--mid)';
        const amtPfx = t.type==='DEPOSIT'?'+':t.type==='WITHDRAW'?'-':'';
        // qty × price display
        const qty    = parseFloat(t.qty)||0;
        const price  = parseFloat(t.price)||0;
        const amount = parseFloat(t.amount)||0;
        const qtyStr = qty ? `<span style="font-family:var(--mono);font-size:12px;color:var(--mid)">${f2(qty,4)}</span>` : '—';
        const prcStr = price ? `<span style="font-family:var(--mono);font-size:11px;color:var(--dim)">@${usd(price)}</span>` : '';
        const feeStr = t.fee ? `<span style="font-size:10px;color:var(--dim)">${usd(t.fee)}</span>` : '—';

        return `<tr>
          <td class="mono" style="font-size:11px;color:var(--dim)">${esc(t.date)}</td>
          <td><span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${txn.color}">${txn.icon} ${txn.label}</span></td>
          <td>${flowHtml}</td>
          <td class="mono" style="font-size:13px;font-weight:700;color:var(--txt)">${esc(t.asset||'USD')}</td>
          <td class="mono">${qtyStr} ${prcStr}</td>
          <td class="mono" style="font-size:13px;font-weight:700;color:${amtClr}">${amtPfx}${usd(amount)}</td>
          <td>${feeStr}</td>
          <td style="font-size:11px;color:var(--dim);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.note||'—')}</td>
          <td><div style="display:flex;gap:6px">
            <button class="btn ghost sm" onclick="editTxn('${t.id}')">编辑</button>
            <button class="btn red sm"   onclick="delTxn('${t.id}')">删除</button>
          </div></td>
        </tr>`;
      }).join('');

  const typeOpts = ['',...Object.keys(TXN_TYPES)].map(k=>
    `<option value="${k}"${txnFilter.type===k?' selected':''}>${k?TXN_TYPES[k].label:'全部类型'}</option>`).join('');
  const accOpt = state.accounts.map(a=>
    `<option value="${a.id}"${txnFilter.accountId===a.id?' selected':''}>${esc(a.name)}</option>`).join('');

  return `
  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi">
      <div class="kpi-label">累计入金</div>
      <div class="kpi-val" style="color:var(--acc)">${usd(totalIn)}</div>
      <div class="kpi-sub">${state.transfers.filter(t=>t.type==='DEPOSIT').length} 笔</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">累计出金</div>
      <div class="kpi-val" style="color:var(--red)">${usd(totalOut)}</div>
      <div class="kpi-sub">${state.transfers.filter(t=>t.type==='WITHDRAW').length} 笔</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">净入金</div>
      <div class="kpi-val" style="color:${netClr}">${netFlow>=0?'+':''}${usd(netFlow)}</div>
      <div class="kpi-sub">${state.transfers.filter(t=>t.type==='TRANSFER').length} 笔内部转账</div>
    </div>
  </div>
  <div class="section-hdr">
    <span class="section-title">资金流水</span>
    <button class="btn" onclick="addTxn()">+ 添加记录</button>
  </div>
  <div class="filter-row">
    <select style="width:130px" onchange="txnFilter.type=this.value;render()">${typeOpts}</select>
    <select style="width:160px" onchange="txnFilter.accountId=this.value;render()">
      <option value="">全部账户</option>${accOpt}
    </select>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr>
      <th>日期</th><th>类型</th><th>流向</th><th>资产</th><th>数量 / 单价</th><th>金额</th><th>手续费</th><th>备注</th><th>操作</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function accTagSmall(a){
  return `<span class="tag" style="color:${a.color};background:${a.color}22;font-size:11px">${esc(a.name)}</span>`;
}

function addTxn(){ openTxnModal(null); }
function editTxn(id){ openTxnModal((state.transfers||[]).find(t=>t.id===id)); }
function delTxn(id){
  if(!confirm('确认删除此记录？')) return;
  state.transfers = (state.transfers||[]).filter(t=>t.id!==id);
  save(); render();
}

function openTxnModal(t){
  const d = t||{type:'DEPOSIT', date:today(), fromAccountId:'', toAccountId:'',
    externalName:'', asset:'USD', qty:'', price:'', amount:'', fee:'', note:''};
  const typeOpts = Object.entries(TXN_TYPES).map(([k,v])=>
    `<option value="${k}"${d.type===k?' selected':''}>${v.icon} ${v.label}</option>`).join('');

  // pre-calc display value
  const initAmt = d.amount
    ? '$'+parseFloat(d.amount).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})
    : '—';

  showModal(`
    <div class="modal-hdr">
      <span class="modal-title">${t?'编辑流水':'添加资金流水'}</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="grid2">
      <div class="field"><label>类型</label>
        <select id="f-txntype" onchange="txnTypeSwitch()">${typeOpts}</select>
      </div>
      <div class="field"><label>日期</label>
        <input id="f-date" type="date" value="${d.date}"/>
      </div>
    </div>

    <!-- 入金 -->
    <div id="txn-deposit" style="display:${d.type==='DEPOSIT'?'block':'none'}">
      <div class="grid2">
        <div class="field"><label>来源名称（银行 / 平台）</label>
          <input id="f-extname-in" value="${esc(d.externalName||'')}" placeholder="如 招商银行、支付宝"/>
        </div>
        <div class="field"><label>目标账户</label>
          <select id="f-to-dep">${accOpts(d.toAccountId)}</select>
        </div>
      </div>
    </div>

    <!-- 出金 -->
    <div id="txn-withdraw" style="display:${d.type==='WITHDRAW'?'block':'none'}">
      <div class="grid2">
        <div class="field"><label>来源账户</label>
          <select id="f-from-wd">${accOpts(d.fromAccountId)}</select>
        </div>
        <div class="field"><label>目的地名称（银行 / 平台）</label>
          <input id="f-extname-out" value="${esc(d.externalName||'')}" placeholder="如 招商银行、支付宝"/>
        </div>
      </div>
    </div>

    <!-- 内部转账 -->
    <div id="txn-transfer" style="display:${d.type==='TRANSFER'?'block':'none'}">
      <div class="grid2">
        <div class="field"><label>转出账户</label>
          <select id="f-from-tr">${accOpts(d.fromAccountId)}</select>
        </div>
        <div class="field"><label>转入账户</label>
          <select id="f-to-tr">${accOpts(d.toAccountId)}</select>
        </div>
      </div>
    </div>

    <div style="margin-top:4px;margin-bottom:4px;font-size:10px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono)">资产信息</div>
    <div class="grid4">
      <div class="field"><label>资产</label>
        <input id="f-asset" value="${esc(d.asset||'USD')}" placeholder="USD / BTC…"
          oninput="this.value=this.value.toUpperCase()"/>
      </div>
      <div class="field"><label>数量</label>
        <input id="f-qty" type="number" value="${esc(d.qty||'')}" placeholder="0.00"
          oninput="txnRecalc()"/>
      </div>
      <div class="field"><label>单价 USD（可选）</label>
        <input id="f-price" type="number" value="${esc(d.price||'')}" placeholder="USD 稳定币填 1"
          oninput="txnRecalc()"/>
      </div>
      <div class="field"><label>金额 USD（自动）</label>
        <div id="txn-amt-live" style="padding:9px 13px;background:var(--bg);border:1px solid var(--bdr);
          border-radius:8px;font-family:var(--mono);font-size:13px;color:var(--acc);font-weight:700">
          ${initAmt}
        </div>
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label>手续费 USD（可选）</label>
        <input id="f-fee" type="number" value="${esc(d.fee||'')}" placeholder="0.00"/>
      </div>
      <div class="field"><label>备注</label>
        <input id="f-note" value="${esc(d.note||'')}" placeholder="可选"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn" onclick="saveTxn('${t?t.id:''}')">保存</button>
      <button class="btn ghost" onclick="closeModal()">取消</button>
    </div>
  `);
}

function txnRecalc(){
  const qty   = parseFloat(document.getElementById('f-qty')?.value)||0;
  const price = parseFloat(document.getElementById('f-price')?.value)||0;
  const el    = document.getElementById('txn-amt-live');
  if(!el) return;
  if(qty && price){
    const amt = qty * price;
    el.textContent = '$'+amt.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    el.style.color = 'var(--acc)';
  } else if(qty){
    el.textContent = `${f2(qty,4)} ${(document.getElementById('f-asset')?.value||'').toUpperCase()}`;
    el.style.color = 'var(--mid)';
  } else {
    el.textContent = '—';
    el.style.color = 'var(--dim)';
  }
}

function txnTypeSwitch(){
  const typ = document.getElementById('f-txntype')?.value;
  document.getElementById('txn-deposit') .style.display = typ==='DEPOSIT'  ?'block':'none';
  document.getElementById('txn-withdraw').style.display = typ==='WITHDRAW' ?'block':'none';
  document.getElementById('txn-transfer').style.display = typ==='TRANSFER' ?'block':'none';
}

function saveTxn(id){
  const type = v('f-txntype');
  const qty   = v('f-qty');
  const price = v('f-price');
  const asset = v('f-asset')||'USD';
  if(!qty){ alert('请填写数量'); return; }

  // amount = qty * price（有单价时）；纯稳定币/USD 可以只填数量
  const qtyN   = parseFloat(qty)||0;
  const priceN = parseFloat(price)||0;
  const amount = priceN>0 ? (qtyN*priceN).toFixed(2) : qty;

  let fromAccountId='', toAccountId='', externalName='';
  if(type==='DEPOSIT'){
    toAccountId  = v('f-to-dep');
    externalName = v('f-extname-in');
    if(!toAccountId){ alert('请选择目标账户'); return; }
  } else if(type==='WITHDRAW'){
    fromAccountId = v('f-from-wd');
    externalName  = v('f-extname-out');
    if(!fromAccountId){ alert('请选择来源账户'); return; }
  } else {
    fromAccountId = v('f-from-tr');
    toAccountId   = v('f-to-tr');
    if(!fromAccountId||!toAccountId){ alert('请选择转出和转入账户'); return; }
    if(fromAccountId===toAccountId){ alert('转出和转入账户不能相同'); return; }
  }

  const obj = {
    id: id||uid(),
    type, date: v('f-date')||today(),
    fromAccountId, toAccountId, externalName,
    asset, qty, price, amount,
    fee: v('f-fee'), note: v('f-note')
  };

  if(!state.transfers) state.transfers=[];
  if(id) state.transfers = state.transfers.map(t=>t.id===id?obj:t);
  else   state.transfers.push(obj);
  save(); closeModal(); goTab('transfers');
}

function renderAccounts(){
  const cards = state.accounts.map(a=>{
    const positions = state.positions.filter(p=>p.accountId===a.id);
    const trades    = state.trades.filter(t=>t.accountId===a.id);
    const totalVal  = positions.reduce((s,p)=>{
      const v = p.currentValue!=null&&p.currentValue!==''?+p.currentValue:(+p.amount||0)*(+p.currentPrice||0);
      return s+v;
    },0);
    return `<div class="card acc-card" style="border-color:${a.color}30;cursor:pointer" onclick="viewAcc('${a.id}')">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="font-size:15px;font-weight:700;font-family:var(--mono);color:var(--txt);margin-bottom:6px">${esc(a.name)}</div>
          ${tag(TYPE_LABEL[a.type],a.color)}
        </div>
        <div style="width:9px;height:9px;border-radius:50%;background:${a.color};box-shadow:0 0 7px ${a.color};margin-top:3px"></div>
      </div>
      <div style="font-size:20px;font-weight:800;font-family:var(--mono);color:var(--txt);margin:10px 0 4px">${totalVal>0?usd(totalVal):'—'}</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:12px">${positions.length} 持仓 · ${trades.length} 交易</div>
      <div style="display:flex;gap:7px" onclick="event.stopPropagation()">
        <button class="btn ghost sm" onclick="editAcc('${a.id}')">编辑</button>
        <button class="btn red sm" onclick="delAcc('${a.id}')">删除</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="section-hdr"><span class="section-title">账户管理</span>
    <button class="btn" onclick="addAcc()">+ 添加账户</button></div>
  <div style="font-size:11px;color:var(--dim);margin-bottom:12px">点击账户卡片查看持仓详情</div>
  <div class="grid3">${cards||'<div style="color:var(--dim);font-size:13px">暂无账户</div>'}</div>`;
}

function viewAcc(id){
  _accDetailOpen = id;
  const a = state.accounts.find(x=>x.id===id); if(!a) return;
  const positions = state.positions.filter(p=>p.accountId===id);
  const trades    = state.trades.filter(t=>t.accountId===id).sort((a,b)=>b.date>a.date?1:-1).slice(0,10);

  const getVal = p => {
    const amt=parseFloat(p.amount)||0, prc=parseFloat(p.currentPrice)||0;
    if(amt&&prc) return amt*prc;
    return parseFloat(p.currentValue)||0;
  };
  const totalVal = positions.reduce((s,p)=>s+getVal(p),0);

  const iStyle = `background:var(--bg);border:1px solid var(--acc)55;border-radius:5px;padding:3px 6px;color:var(--txt);font-size:12px;font-family:var(--mono);outline:none`;

  // Each position row: display mode, click → inline edit in-place via DOM swap
  const posRows = positions.length===0
    ? `<div style="font-size:13px;color:var(--dim);padding:12px 0">暂无持仓，点击上方「+ 添加资产」</div>`
    : positions.map(p=>{
        const v   = getVal(p);
        const pct = totalVal>0 ? v/totalVal*100 : 0;
        return `
        <div id="accpos-${p.id}" style="border-bottom:1px solid var(--bdr)">
          <!-- display -->
          <div id="accpos-disp-${p.id}"
            style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;cursor:pointer"
            onclick="accPosEdit('${p.id}')" title="点击编辑">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:13px;font-weight:700;font-family:var(--mono);color:var(--txt)">${esc(p.asset)}</span>
              <span style="font-size:11px;color:var(--dim);font-family:var(--mono)">${f2(p.amount,4)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="text-align:right">
                <div style="font-size:13px;font-family:var(--mono);color:var(--txt)">${usd(v)}</div>
                <div style="font-size:10px;color:var(--dim)">${pct.toFixed(1)}% · @${usd(p.currentPrice)}</div>
              </div>
              <button onclick="event.stopPropagation();accPosDel('${p.id}','${id}')"
                style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:4px"
                onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--dim)'"
                title="删除此资产">×</button>
            </div>
          </div>
          <!-- edit (hidden by default) -->
          <div id="accpos-edit-${p.id}" style="display:none;padding:8px 0;gap:6px;align-items:center;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:700;font-family:var(--mono);color:var(--acc);min-width:48px">${esc(p.asset)}</span>
            <input id="aie-amt-${p.id}"   type="number" style="${iStyle};width:90px"  value="${esc(p.amount)}"           placeholder="数量"   oninput="accPosRecalc('${p.id}')"/>
            <input id="aie-prc-${p.id}"   type="number" style="${iStyle};width:100px" value="${esc(p.currentPrice||'')}" placeholder="当前价" oninput="accPosRecalc('${p.id}')"/>
            <input id="aie-cost-${p.id}"  type="number" style="${iStyle};width:90px"  value="${esc(p.avgCost||'')}"      placeholder="均价"/>
            <span id="aie-val-${p.id}" style="font-size:12px;font-family:var(--mono);color:var(--acc);min-width:70px">${usd(v)}</span>
            <button class="btn sm" onclick="accPosConfirm('${p.id}','${id}')">✓</button>
            <button class="btn ghost sm" onclick="accPosCancel('${p.id}')">✕</button>
          </div>
        </div>`;
      }).join('');

  const trdRows = trades.length===0
    ? `<div style="font-size:13px;color:var(--dim);padding:12px 0">暂无交易</div>`
    : trades.map(t=>{
        const sideClr = t.side==='BUY'?'#00FFA3':'#FF4D6A';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr)">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:13px;font-weight:700;font-family:var(--mono);color:var(--txt)">${esc(t.asset)}</span>
            ${tag(t.side==='BUY'?'买入':'卖出',sideClr)}
          </div>
          <div style="text-align:right">
            <div style="font-size:12px;font-family:var(--mono);color:var(--mid)">${usd((+t.amount||0)*(+t.price||0))}</div>
            <div style="font-size:10px;color:var(--dim)">${esc(t.date)}</div>
          </div>
        </div>`;
      }).join('');

  showModal(`
    <div class="modal-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:10px;height:10px;border-radius:50%;background:${a.color};box-shadow:0 0 8px ${a.color}"></div>
        <span class="modal-title">${esc(a.name)}</span>
        ${tag(TYPE_LABEL[a.type],a.color)}
      </div>
      <button class="modal-close" onclick="_accDetailOpen=null;closeModal()">×</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <div style="flex:1;background:var(--bg);border-radius:10px;padding:14px 16px;border:1px solid var(--bdr)">
        <div style="font-size:10px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono);margin-bottom:6px">总价值</div>
        <div style="font-size:22px;font-weight:800;font-family:var(--mono);color:var(--txt)" id="acc-totalval">${totalVal>0?usd(totalVal):'—'}</div>
      </div>
      <div style="flex:1;background:var(--bg);border-radius:10px;padding:14px 16px;border:1px solid var(--bdr)">
        <div style="font-size:10px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono);margin-bottom:6px">持仓 / 交易</div>
        <div style="font-size:22px;font-weight:800;font-family:var(--mono);color:var(--txt)">${positions.length} <span style="font-size:14px;color:var(--dim)">/ ${trades.length}</span></div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div style="font-size:10px;color:var(--dim);letter-spacing:1.2px;text-transform:uppercase;font-family:var(--mono)">持仓明细</div>
      <button class="btn sm" onclick="accPosAdd('${id}')">+ 添加资产</button>
    </div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:10px">点击行编辑 · 右侧 × 删除该资产</div>
    <div style="margin-bottom:18px" id="acc-poslist">${posRows}
      <div id="acc-add-form" style="display:none;padding:10px 0;border-top:1px solid var(--acc)33;margin-top:4px">

// AI CHAT with image/file upload
// ═══════════════════════════════════════════════════════
let aiMsgs = [];
let aiPending = null;
let aiUploadedFile = null; // {base64, mediaType, name}

function openAI(){
  if(aiMsgs.length === 0){
    aiMsgs = [{r:'ai', t:'你好！告诉我要记录什么，我来帮你解析保存。\n\n📝 文字示例：\n• 昨天在 Binance 买了 0.5 ETH，价格 2800 刀\n• OKX 卖出 500 SOL，盈利 320 美金\n• MetaMask 质押 2 ETH，APY 4.5%\n\n📎 也可以上传截图：\n直接粘贴或上传交易截图，我来识别里面的记录'}];
  }
  renderAIModal();
}

function renderAIModal(){
  const bubbles = aiMsgs.map(m=>{
    let extra = '';
    if(m.hasBtn && aiPending){
      extra = `<div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn sm" onclick="aiConfirm()">确认保存</button>
        <button class="btn ghost sm" onclick="aiCancel()">取消</button>
      </div>`;
    }
    if(m.img){
      extra = `<img src="${m.img}" style="max-width:100%;max-height:160px;border-radius:6px;margin-top:8px;display:block"/>` + extra;
    }
    return `<div style="display:flex;justify-content:${m.r==='user'?'flex-end':'flex-start'}">
      <div class="bubble ${m.r}">${esc(m.t)}${extra}</div>
    </div>`;
  }).join('');

  const uploadPreview = aiUploadedFile
    ? `<div style="position:relative;margin-bottom:8px">
        <img src="data:${aiUploadedFile.mediaType};base64,${aiUploadedFile.base64}"
          style="max-height:80px;border-radius:6px;border:1px solid var(--bdr)"/>
        <span style="font-size:11px;color:var(--mid);margin-left:8px">${esc(aiUploadedFile.name)}</span>
        <button onclick="clearUpload()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;margin-left:6px">×</button>
      </div>` : '';

  showModal(`
    <div class="modal-hdr">
      <span class="modal-title">✦ AI 智能录入</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="chat-msgs" id="chat-msgs">${bubbles}</div>
    ${uploadPreview}
    <div style="margin-bottom:8px">
      <label class="upload-area" id="upload-area" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
        <input type="file" id="file-input" accept="image/*,.pdf" onchange="fileChosen(event)"/>
        <div style="font-size:12px;color:var(--dim)">📎 点击上传截图 / 拖拽文件到此处（支持 JPG、PNG、PDF）</div>
      </label>
    </div>
    <div class="chat-input-row">
      <textarea id="ai-inp" rows="2" placeholder="描述交易、持仓或理财… (Enter 发送，Shift+Enter 换行)"
        onkeydown="aiKey(event)" style="flex:1"></textarea>
      <button class="btn" onclick="aiSend()" style="align-self:stretch;padding-left:20px;padding-right:20px">发送</button>
    </div>
    <div class="chat-hint">💡 AI 录入需联网 · 可上传截图让 AI 自动识别</div>
  `, true);

  // scroll to bottom
  setTimeout(()=>{
    const c = document.getElementById('chat-msgs');
    if(c) c.scrollTop = c.scrollHeight;
  }, 50);
}

function dragOver(e){ e.preventDefault(); document.getElementById('upload-area')?.classList.add('dragover'); }
function dragLeave(e){ document.getElementById('upload-area')?.classList.remove('dragover'); }
function dropFile(e){
  e.preventDefault();
  dragLeave(e);
  const file = e.dataTransfer?.files?.[0];
  if(file) processFile(file);
}
function fileChosen(e){ const file = e.target.files?.[0]; if(file) processFile(file); }

function processFile(file){
  const allowed = ['image/jpeg','image/png','image/gif','image/webp','application/pdf'];
  if(!allowed.includes(file.type)){ alert('请上传图片或 PDF 文件'); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    const dataUrl = e.target.result;
    const base64 = dataUrl.split(',')[1];
    aiUploadedFile = {base64, mediaType: file.type, name: file.name};
    renderAIModal();
  };
  reader.readAsDataURL(file);
}

function clearUpload(){ aiUploadedFile = null; renderAIModal(); }

function aiKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();aiSend();} }

async function aiSend(){
  const inp = document.getElementById('ai-inp');
  const txt = inp?.value?.trim()||'';
  if(!txt && !aiUploadedFile) return;

  // Build user message display
  const displayTxt = txt || (aiUploadedFile ? `[上传了文件：${aiUploadedFile.name}]` : '');
  aiMsgs.push({r:'user', t:displayTxt, img: aiUploadedFile ? `data:${aiUploadedFile.mediaType};base64,${aiUploadedFile.base64}` : null});

  const sentFile = aiUploadedFile;
  aiUploadedFile = null;
  if(inp) inp.value = '';

  // Show loading
  aiMsgs.push({r:'ai', t:'AI 解析中…', loading:true});
  renderAIModal();

  try{
    const result = await callAI(txt, sentFile, state.accounts);
    // Remove loading msg
    aiMsgs = aiMsgs.filter(m=>!m.loading);

    if(result.action==='unknown'){
      aiMsgs.push({r:'ai', t:'❌ 没能理解，请换种方式描述\n例："在 Binance 买了 100 SOL，价格 150 美元"'});
    } else {
      aiPending = result;
      aiMsgs.push({r:'ai', t:`✅ 解析完成：${result.summary}\n\n确认保存吗？`, hasBtn:true});
    }
  }catch(e){
    aiMsgs = aiMsgs.filter(m=>!m.loading);
    aiMsgs.push({r:'ai', t:`⚠️ 出错：${e.message}`});
  }
  renderAIModal();
}

  return {
    system: `You are a crypto portfolio parser. Extract records from user input and return ONLY a single valid JSON object — no explanation, no markdown, no code fences, no extra text before or after.

Available accounts:
${list}

Output this JSON (omit unused fields):
{"action":"add_trade","data":{...},"summary":"中文确认"}

action must be one of: add_trade | add_position | add_finance | unknown

For add_trade: data = {accountId, date(YYYY-MM-DD), asset, side(BUY|SELL), amount, price, fee, pnl, note}
For add_position: data = {accountId, asset, amount, avgCost, currentPrice, currentValue, note}
For add_finance: data = {accountId, asset, type(STAKING|LENDING|LP|FIXED|OTHER), denomination(USD|COIN), principal, apy, startDate, endDate, income, status(ACTIVE|ENDED), note}

summary must be a short Chinese confirmation sentence.

  };

// ─── Robustly extract JSON from potentially messy model output ───
function extractJSON(raw){
  if(!raw || !raw.trim()) throw new Error('模型返回了空内容');
  // Try direct parse first
  try{ return JSON.parse(raw.trim()); }catch(e){}
  // Strip markdown code fences
  let s = raw.replace(/```[\w]*\n?/g,'').replace(/```/g,'').trim();
  try{ return JSON.parse(s); }catch(e){}
  // Extract first {...} block
  const m = s.match(/\{[\s\S]*\}/);
  if(m){ try{ return JSON.parse(m[0]); }catch(e){} }
  // Give up with context
  throw new Error(`无法解析模型返回内容：${raw.slice(0,120)}…`);
}

async function callAI(text, fileData, accounts){
  const cfg = getAIConfig();
  if(!cfg.provider || !cfg.key){
    throw new Error('未配置 AI 模型\n请点击右上角「⚠ 设置 AI」按钮选择模型并填入 API Key');
  }

  const {system, userText} = buildPrompt(text, accounts);
  const provider = cfg.provider;
  const p = PROVIDERS[provider];

  // ── Claude：支持浏览器直接调用 ──
  if(provider === 'claude'){
    const content = [];
    if(fileData){
      content.push(fileData.mediaType==='application/pdf'
        ? {type:'document', source:{type:'base64', media_type:'application/pdf', data:fileData.base64}}
        : {type:'image',    source:{type:'base64', media_type:fileData.mediaType, data:fileData.base64}});
    }
    content.push({type:'text', text: userText});

    const res = await fetch(p.url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': cfg.key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:2048, system, messages:[{role:'user', content}]})
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${res.status}`); }
    const d = await res.json();
    const raw = (d.content||[]).map(c=>c.text||'').join('');
    return extractJSON(raw);
  }

  // ── MiniMax（标准 OpenAI 兼容格式，无需 Group ID）──
  if(provider === 'minimax'){
    const res = await fetch(p.url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${cfg.key}`,
      },
      body: JSON.stringify({
        model: 'MiniMax-Text-01',
        max_tokens: 2048,
        messages: [
          {role:'system', content: system},
          {role:'user',   content: userText}
        ]
      })
    }).catch(()=>{ throw new Error('MiniMax 请求被浏览器拦截（CORS 限制）\n请部署到 GitHub Pages 后使用，或改用 Claude API'); });

    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${res.status}`); }
    const d = await res.json();
    const raw = d.choices?.[0]?.message?.content || '';
    return extractJSON(raw);
  }

  // ── OpenAI / DeepSeek ──
  const messages = [{role:'system', content: system}];
  let userMsgContent;
  if(fileData && p.supportsImage){
    userMsgContent = [
      {type:'image_url', image_url:{url:`data:${fileData.mediaType};base64,${fileData.base64}`}},
      {type:'text', text: userText}
    ];
  } else {
    const note = (fileData && !p.supportsImage) ? '[用户上传了图片，但当前模型不支持图片识别，请根据文字描述处理]\n' : '';
    userMsgContent = note + userText;
  }
  messages.push({role:'user', content: userMsgContent});

  const modelMap = {openai:'gpt-4o-mini', minimax:'MiniMax-Text-01', deepseek:'deepseek-chat'};
  const supportsJsonMode = (provider==='openai' || provider==='deepseek');
  const reqBody = {
    model: modelMap[provider],
    max_tokens: 2048,
    messages,
    ...(supportsJsonMode ? {response_format:{type:'json_object'}} : {})
  };

  // 直接调用，不走代理（代理无法转发 Authorization header，必然失败）
  let res;
  try {
    res = await fetch(p.url, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${cfg.key}`,
      },
      body: JSON.stringify(reqBody)
    });
  } catch(fetchErr) {
    // fetch 本身抛错 = CORS 被浏览器拦截
    throw new Error(
      `❌ 浏览器拦截了请求（CORS 限制）\n\n` +
      `从本地 HTML 文件无法直接调用 ${p.name} 的 API。\n\n` +
      `✅ 解决方法：改用 Claude API\n` +
      `→ 右上角「设置 AI」→ 选择 Claude → 填入 API Key`
    );
  }

  if(!res.ok){
    const e = await res.json().catch(()=>({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }

  const d = await res.json().catch(()=>null);
  if(!d) throw new Error('响应为空');
  if(d.error) throw new Error(d.error?.message || JSON.stringify(d.error));

  const raw = d.choices?.[0]?.message?.content||'';
  return extractJSON(raw);
}

let importParsed = null; // {positions, newAccounts}

function importDrop(e){
  e.preventDefault();
  document.getElementById('import-area')?.classList.remove('dragover');
  const file = e.dataTransfer?.files?.[0];
  if(file) processImportFile(file);
}
function importFileChosen(e){ const f=e.target.files?.[0]; if(f) processImportFile(f); }

function parseCSV(text){
  // Handle BOM
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const lines = text.split(/\r?\n/);
  const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const line = lines[i].trim();
    if(!line) continue;
    // Handle quoted fields with commas
    const cols = [];
    let cur='', inQ=false;
    for(let c of line){
      if(c==='"'){ inQ=!inQ; }
      else if(c===','&&!inQ){ cols.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cols.push(cur.trim());
    const row={};
    headers.forEach((h,i)=>{ row[h]=cols[i]||''; });
    rows.push(row);
  }
  return rows;
}

function cleanNum(s){
  if(!s||s==='—'||s==='-') return '';
  return s.replace(/[$,\s]/g,'').replace(/^"(.*)"$/,'$1');
}

function processImportFile(file){
  if(!file.name.endsWith('.csv')){ alert('请上传 .csv 文件'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const rows = parseCSV(e.target.result);

      // Detect column mapping — supports both Notion format and generic
      const sample = rows[0]||{};
      const keys = Object.keys(sample);

      // Map: 名称→account, 币种→asset, 数量→amount, 价格→currentPrice, 金额(USD)→currentValue, 备注→note, 类型→accType
      const COL = {
        name:    keys.find(k=>/名称|账户|account/i.test(k))||'名称',
        type:    keys.find(k=>/类型|type/i.test(k))||'类型',
        asset:   keys.find(k=>/币种|资产|asset|coin/i.test(k))||'币种',
        amount:  keys.find(k=>/数量|amount|qty/i.test(k))||'数量',
        price:   keys.find(k=>/^价格$|^price$/i.test(k))||'价格',
        value:   keys.find(k=>/金额|value|USD/i.test(k))||'金额(USD)',
        note:    keys.find(k=>/备注|note|remark/i.test(k))||'备注',
        status:  keys.find(k=>/状态|status/i.test(k))||'状态',
      };

      // Determine account type mapping
      const typeMap = {'交易所':'CEX','链上钱包':'WALLET','美股':'US_STOCK','DEX':'DEX','CEX':'CEX','WALLET':'WALLET'};

      // Collect unique accounts from CSV
      const csvAccounts = {};
      rows.forEach(r=>{
        const name = (r[COL.name]||'').trim();
        if(!name) return;
        const rawType = (r[COL.type]||'').trim();
        const mappedType = typeMap[rawType]||'CEX';
        if(!csvAccounts[name]) csvAccounts[name]={name,rawType,mappedType};
      });

      // Find which accounts are new (not in state)
      const existingNames = state.accounts.map(a=>a.name.toLowerCase());
      const newAccounts = Object.values(csvAccounts).filter(a=>!existingNames.includes(a.name.toLowerCase()));

      // Build positions to import (skip rows with no asset or zero/empty value)
      const toImport = [];
      rows.forEach(r=>{
        const name   = (r[COL.name]||'').trim();
        const asset  = (r[COL.asset]||'').trim().toUpperCase();
        const valRaw = cleanNum(r[COL.value]);
        const amtRaw = cleanNum(r[COL.amount]);
        if(!name||!asset) return;
        // Skip rows with 0 value and 0 amount
        if((+valRaw||0)===0 && (+amtRaw||0)===0) return;
        // Skip Hyena empty row
        if(!asset) return;

        toImport.push({
          _accName: name,
          asset,
          amount:   amtRaw,
          avgCost:  '',
          currentPrice: cleanNum(r[COL.price]),
          currentValue: valRaw,
          note:     (r[COL.note]||'').trim(),
        });
      });

      importParsed = {toImport, newAccounts, csvAccounts, COL};

      // Build preview table
      const prev = toImport.slice(0,5).map(p=>`
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:6px 0;border-bottom:1px solid var(--bdr);font-family:var(--mono)">
          <span style="color:var(--mid)">${esc(p._accName)}</span>
          <span style="color:var(--txt);font-weight:700">${esc(p.asset)}</span>
          <span style="color:var(--mid)">${p.amount||'—'}</span>
          <span style="color:var(--acc)">${p.currentValue?'$'+p.currentValue:'—'}</span>
        </div>`).join('');

      const newAccList = newAccounts.length>0
        ? `<div style="margin-top:6px;font-size:12px;color:var(--mid)">📌 将自动创建 ${newAccounts.length} 个新账户：${newAccounts.map(a=>`<span style="color:var(--txt)">${esc(a.name)}</span>`).join('、')}</div>`
        : '';

      document.getElementById('import-preview').style.display='block';
      document.getElementById('import-preview-content').innerHTML =
        `<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:4px 0;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)">
          <span>账户</span><span>资产</span><span>数量</span><span>价值</span></div>`+prev+
        (toImport.length>5?`<div style="font-size:11px;color:var(--dim);padding-top:6px">…共 ${toImport.length} 条</div>`:'');

      document.getElementById('import-summary').innerHTML =
        `✅ 识别到 <strong style="color:var(--acc)">${toImport.length}</strong> 条持仓记录，来自 <strong style="color:var(--acc)">${Object.keys(csvAccounts).length}</strong> 个账户${newAccList}`;

    }catch(err){
      alert('解析失败：'+err.message+'\n请确认文件是从 Notion 导出的 CSV。');
    }
  };
  reader.readAsText(file, 'utf-8');
}

function doImport(){
  if(!importParsed) return;
  const {toImport, newAccounts, csvAccounts} = importParsed;

  // Create new accounts first
  const accColorPool = ['#F0B90B','#2563EB','#FF007A','#10B981','#E97B2E','#8B5CF6','#06B6D4','#EC4899','#FF4D6A','#00FFA3'];
  let colorIdx = state.accounts.length % accColorPool.length;
  newAccounts.forEach(na=>{
    state.accounts.push({
      id: uid(),
      name: na.name,
      type: na.mappedType,
      color: accColorPool[colorIdx++ % accColorPool.length]
    });
  });

  // Build name→id map
  const nameToId = {};
  state.accounts.forEach(a=>{ nameToId[a.name.toLowerCase()]=a.id; });

  // Add positions
  let added=0, skipped=0;
  toImport.forEach(p=>{
    const accId = nameToId[p._accName.toLowerCase()];
    if(!accId){ skipped++; return; }
    // Check for duplicate (same account + same asset)
    const dup = state.positions.find(x=>x.accountId===accId&&x.asset===p.asset);
    if(dup){ skipped++; return; }
    state.positions.push({
      id: uid(),
      accountId: accId,
      asset: p.asset,
      amount: p.amount,
      avgCost: p.avgCost,
      currentPrice: p.currentPrice,
      currentValue: p.currentValue,
      note: p.note,
    });
    added++;
  });

  save();
  closeModal();
  importParsed = null;
  goTab('positions');
  setTimeout(()=>{
    showModal(`
      <div class="modal-hdr">
        <span class="modal-title">✅ 导入完成</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div style="font-size:15px;color:var(--txt);margin-bottom:16px">
        成功导入 <span style="color:var(--acc);font-weight:800;font-size:22px">${added}</span> 条持仓记录
        ${skipped>0?`<br/><span style="font-size:12px;color:var(--dim)">（${skipped} 条重复或跳过）</span>`:''}
      </div>
      <div style="font-size:13px;color:var(--mid);margin-bottom:18px;line-height:1.7">
        💡 建议接下来：<br/>
        • 在「持仓」页面检查各账户归属是否正确<br/>
        • 补充每条持仓的「均价」以启用盈亏计算<br/>
        • 在「账户」页面调整账户类型和颜色
      </div>
      <button class="btn" onclick="closeModal()">好的，去看看</button>
    `);
  }, 100);
}

// Map common ticker → CoinGecko id
const GECKO_IDS = {
  BTC:'bitcoin',ETH:'ethereum',BNB:'binancecoin',SOL:'solana',
  USDT:'tether',USDC:'usd-coin',USDE:'ethena-usde',USDG:'usd-coin',
  'USD1':'usd-coin','USD*':'usd-coin',
  AAVE:'aave',HYPE:'hyperliquid',MNT:'mantle',WETH:'weth',
  LINK:'chainlink',UNI:'uniswap',OP:'optimism',ARB:'arbitrum',
  AVAX:'avalanche-2',MATIC:'matic-network',DOT:'polkadot',
  ADA:'cardano',XRP:'ripple',DOGE:'dogecoin',SHIB:'shiba-inu',
  LTC:'litecoin',BCH:'bitcoin-cash',ATOM:'cosmos',FTM:'fantom',
  NEAR:'near',APT:'aptos',SUI:'sui',INJ:'injective-protocol',
  TIA:'celestia',PYTH:'pyth-network',WIF:'dogwifcoin',
  JUP:'jupiter-exchange-solana',BONK:'bonk',
};

// US stock tickers (will use Yahoo Finance)
const US_STOCK_ACCS = new Set(['US_STOCK']);

async function refreshPrices(){
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  const lbl  = document.getElementById('refresh-label');
  if(btn.disabled) return;
  btn.disabled = true;
  icon.style.display='inline-block';
  icon.style.animation='spin 1s linear infinite';
  lbl.textContent = '刷新中…';

  // Add spin keyframe if not there
  if(!document.getElementById('spin-style')){
    const s=document.createElement('style');
    s.id='spin-style';
    s.textContent='@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }

  try {
    // Collect all unique assets from positions
    const assets = [...new Set(state.positions.map(p=>p.asset.toUpperCase()))];

    // Split: crypto vs stock
    const cryptoAssets = assets.filter(a=>GECKO_IDS[a]);
    const stockAssets  = assets.filter(a=>{
      const pos = state.positions.find(p=>p.asset.toUpperCase()===a);
      const acc = pos ? state.accounts.find(x=>x.id===pos.accountId) : null;
      return acc && acc.type==='US_STOCK' && !GECKO_IDS[a];
    });

    const prices = {}; // asset → price

    // ── CoinGecko (free, no key) ──
    if(cryptoAssets.length>0){
      const ids = [...new Set(cryptoAssets.map(a=>GECKO_IDS[a]))].join(',');
      try{
        const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
        if(res.ok){
          const data = await res.json();
          cryptoAssets.forEach(a=>{
            const geckoId = GECKO_IDS[a];
            if(data[geckoId]?.usd) prices[a] = data[geckoId].usd;
          });
        }
      }catch(e){ console.warn('CoinGecko failed',e); }
    }

    // ── Yahoo Finance via allorigins proxy (CORS-free) ──
    if(stockAssets.length>0){
      for(const sym of stockAssets){
        try{
          const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`;
          const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
          const res = await fetch(proxy);
          if(res.ok){
            const wrapper = await res.json();
            const d = JSON.parse(wrapper.contents);
            const p = d?.chart?.result?.[0]?.meta?.regularMarketPrice;
            if(p) prices[sym] = p;
          }
        }catch(e){ console.warn('Yahoo failed for',sym,e); }
      }
    }

    // ── Apply prices ──
    let updated = 0;
    state.positions = state.positions.map(p=>{
      const price = prices[p.asset.toUpperCase()];
      if(price==null) return p;
      const newVal = ((+p.amount||0)*price).toFixed(2);
      updated++;
      return {...p, currentPrice: price.toFixed(price<1?6:2), currentValue: newVal};
    });

    save();
    render();

    const missed = assets.filter(a=>prices[a.toUpperCase()]==null);
    lbl.textContent = `已更新 ${updated} 个`;
    icon.style.animation='';
    icon.textContent='✓';
    setTimeout(()=>{ icon.textContent='↻'; lbl.textContent='刷新价格'; btn.disabled=false; },3000);

    if(missed.length>0){
      setTimeout(()=>{
        showModal(`
          <div class="modal-hdr">
            <span class="modal-title">价格刷新结果</span>
            <button class="modal-close" onclick="closeModal()">×</button>
          </div>
          <div style="font-size:14px;color:var(--txt);margin-bottom:12px">✅ 已更新 <strong style="color:var(--acc)">${updated}</strong> 个持仓价格</div>
          ${missed.length>0?`<div style="font-size:13px;color:var(--mid);margin-bottom:8px">⚠️ 以下代币未能自动获取价格，请手动更新：</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${missed.map(a=>`<span class="tag" style="color:var(--mid);background:var(--bdr)">${esc(a)}</span>`).join('')}</div>
          <div style="font-size:11px;color:var(--dim)">稳定币（USDT/USDC）价格固定为 $1，无需刷新</div>`:''}
          <button class="btn" onclick="closeModal()" style="margin-top:14px">好的</button>
        `);
      },200);
    }

  } catch(e){
    lbl.textContent='刷新失败';
    icon.style.animation='';
    icon.textContent='↻';
    setTimeout(()=>{ lbl.textContent='刷新价格'; btn.disabled=false; },2000);
    alert('价格刷新失败：'+e.message+'\n请检查网络连接。');
  }
}

// ═══════════════════════════════════════════════════════
// DAILY ACCRUAL  —  auto-compound income on page open
// ═══════════════════════════════════════════════════════
function runDailyAccrual(){
  const todayStr = today();
  let anyUpdated = false;
  let totalAccrued = 0; // USD only, for notification
  const coinAccrued = {}; // asset → amount for coin-denominated

  state.finance = state.finance.map(f=>{
    // Only accrue active records with APY and principal
    if(f.status !== 'ACTIVE') return f;
    if(!f.apy || !f.principal) return f;
    const apy = parseFloat(f.apy);
    if(!apy || apy <= 0) return f;

    const lastDate = f.lastAccrualDate || f.startDate || todayStr;
    if(lastDate >= todayStr) return f; // already up to date

    // Calculate days elapsed
    const msPerDay = 86400000;
    const days = Math.floor((new Date(todayStr) - new Date(lastDate)) / msPerDay);
    if(days <= 0) return f;

    const principal = parseFloat(f.principal) || 0;
    const dailyRate = apy / 100 / 365;
    const earned    = principal * dailyRate * days;

    const prevIncome = parseFloat(f.income) || 0;
    const newIncome  = +(prevIncome + earned).toFixed(f.denomination==='COIN' ? 6 : 2);

    anyUpdated = true;
    if(f.denomination === 'COIN'){
      coinAccrued[f.asset] = (coinAccrued[f.asset]||0) + earned;
    } else {
      totalAccrued += earned;
    }

    return {...f, income: String(newIncome), lastAccrualDate: todayStr};
  });

  if(anyUpdated){
    save();
    render();

    // Build notification message
    const lines = [];
    if(totalAccrued > 0) lines.push(`💵 USD 收益 +$${totalAccrued.toFixed(2)}`);
    Object.entries(coinAccrued).forEach(([asset, amt])=>{
      lines.push(`🪙 ${asset} 收益 +${amt.toFixed(6)}`);
    });

    if(lines.length > 0){
      // Show a subtle toast instead of blocking alert
      showToast('📈 理财收益已自动更新\n'+lines.join('\n'));
    }
  }
}

function showToast(msg){
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `
    position:fixed;bottom:80px;right:22px;
    background:#0E1B28;border:1px solid #00FFA344;border-radius:10px;
    padding:12px 16px;font-size:12px;color:#C5D8EE;font-family:'Courier New',monospace;
    line-height:1.7;white-space:pre;z-index:300;
    box-shadow:0 8px 24px #000a;
    animation:fadeInUp .3s ease;
  `;
  if(!document.getElementById('toast-style')){
    const s = document.createElement('style');
    s.id = 'toast-style';
    s.textContent = `@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`;
    document.head.appendChild(s);
  }
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(), 400); }, 4000);
}

// INIT
// ═══════════════════════════════════════════════════════
render();
updateApiKeyBtn();
runDailyAccrual();
</script>
